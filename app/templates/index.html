<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prédiction Clientèle - E-commerce Cadeaux</title>
    <style>
        body { font-family: Arial; background: #f4f4f9; text-align: center; padding: 50px; }
        form { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #45a049; }
        #result { margin-top: 30px; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔮 Prédiction Comportement Client</h1>
    <form action="/predict" method="post">
        <!-- Ajoute ici les champs dont tu as besoin (Recency, Frequency, MonetaryTotal, etc.) -->
        <input type="number" name="Recency" placeholder="Recency (jours)" required>
        <input type="number" name="Frequency" placeholder="Frequency (nb commandes)" required>
        <input type="number" name="MonetaryTotal" placeholder="Montant total dépensé" required>
        <input type="number" name="CustomerTenure" placeholder="Ancienneté client (jours)" required>
        <!-- Tu peux ajouter d'autres champs selon tes features -->
        <button type="submit">Prédire le churn et le segment</button>
    </form>
    <div id="result"></div>
</body>
</html>
